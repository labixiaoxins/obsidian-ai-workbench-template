<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Installation flow</title>
  <desc id="desc">A diagram of the installation command copying the vault template, Obsidian plugin, note actions, and privacy gitignore rules into a vault.</desc>
  <defs>
    <style>
      .bg { fill: #fbfdff; }
      .panel { fill: #ffffff; stroke: #d8dee9; stroke-width: 2; rx: 16; }
      .terminal { fill: #101827; rx: 16; }
      .code { fill: #dbeafe; font-family: "SFMono-Regular", Consolas, monospace; font-size: 22px; }
      .title { fill: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 28px; font-weight: 700; }
      .label { fill: #334155; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 700; }
      .body { fill: #475569; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; }
      .small { fill: #64748b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
      .arrow { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .folder { fill: #facc15; stroke: #ca8a04; stroke-width: 2; }
      .file { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 7; }
      .safe { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 12; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620" />
  <text class="title" x="50" y="60">Install into an Obsidian vault</text>
  <text class="body" x="50" y="94">The installer copies only reusable template files and adds privacy ignore rules for generated logs and backups.</text>

  <rect class="terminal" x="50" y="135" width="1020" height="88" />
  <circle cx="82" cy="166" r="8" fill="#ef4444" />
  <circle cx="110" cy="166" r="8" fill="#f59e0b" />
  <circle cx="138" cy="166" r="8" fill="#22c55e" />
  <text class="code" x="82" y="196">bash skill/scripts/install-template.sh "/path/to/Your Vault"</text>

  <line class="arrow" x1="560" y1="235" x2="560" y2="288" />

  <rect class="panel" x="70" y="305" width="225" height="190" />
  <path class="folder" d="M105 350h60l18 18h78v78H105z" />
  <text class="label" x="105" y="468">Vault template</text>
  <text class="small" x="105" y="492">Chinese folders and sample notes</text>

  <rect class="panel" x="325" y="305" width="225" height="190" />
  <rect class="file" x="365" y="350" width="72" height="92" />
  <rect class="file" x="452" y="350" width="48" height="92" />
  <text class="label" x="365" y="468">Obsidian plugin</text>
  <text class="small" x="365" y="492">side panel and model selector</text>

  <rect class="panel" x="580" y="305" width="225" height="190" />
  <rect class="file" x="620" y="350" width="142" height="30" />
  <rect class="file" x="620" y="395" width="112" height="30" />
  <text class="label" x="620" y="468">Note actions</text>
  <text class="small" x="620" y="492">prompts, profiles, shell runner</text>

  <rect class="panel" x="835" y="305" width="225" height="190" />
  <rect class="safe" x="875" y="350" width="142" height="74" />
  <text class="label" x="875" y="468">Privacy rules</text>
  <text class="small" x="875" y="492">ignore logs and backups in vault Git</text>

  <text class="body" x="70" y="555">After install: enable "Hermes Codex Note Ops" in Obsidian Community plugins.</text>
</svg>

