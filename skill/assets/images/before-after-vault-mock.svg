<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1320" viewBox="0 0 1180 1320" role="img" aria-labelledby="title desc">
  <title id="title">Before and after mock Obsidian vault screenshots</title>
  <desc id="desc">A privacy-safe fake screenshot showing a messy vault before cleanup and a clearer Chinese Obsidian vault with AI workbench after cleanup.</desc>
  <defs>
    <style>
      .page { fill: #f6f8fb; }
      .caption { fill: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 34px; font-weight: 760; }
      .sub { fill: #64748b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; }
      .sectionTitle { fill: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 26px; font-weight: 760; }
      .window { fill: #1f2430; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .chrome { fill: #151923; rx: 18; }
      .dotR { fill: #ff5f57; }
      .dotY { fill: #ffbd2e; }
      .dotG { fill: #28c840; }
      .sidebar { fill: #181c26; }
      .content { fill: #242a36; }
      .pane { fill: #202633; stroke: #374151; stroke-width: 1.4; rx: 12; }
      .tab { fill: #2d3544; rx: 8; }
      .text { fill: #dbe4ef; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; }
      .muted { fill: #94a3b8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
      .dim { fill: #64748b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
      .head { fill: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: 720; }
      .h2 { fill: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 700; }
      .warn { fill: #f97316; }
      .ok { fill: #22c55e; }
      .line { stroke: #475569; stroke-width: 1; }
      .folderStrong { fill: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; }
      .note { fill: #cbd5e1; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; }
      .chip { fill: #1d4ed8; rx: 10; }
      .chip2 { fill: #334155; stroke: #64748b; stroke-width: 1; rx: 10; }
      .chipText { fill: #eff6ff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; }
      .card { fill: #2d3544; stroke: #475569; stroke-width: 1; rx: 10; }
      .callout { fill: #0f172a; stroke: #3b82f6; stroke-width: 1.5; rx: 12; }
      .fake { fill: #38bdf8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 700; }
    </style>
  </defs>
  <rect class="page" width="1180" height="1320" />
  <text class="caption" x="54" y="60">Fake Obsidian Vault Transformation</text>
  <text class="sub" x="54" y="92">All names are fictional. This mockup shows the problem and the result without exposing a real vault.</text>

  <text class="sectionTitle" x="70" y="142">Before: hard to find and reuse</text>
  <g transform="translate(70,165)">
    <rect class="window" width="1040" height="470" />
    <rect class="chrome" width="1040" height="42" />
    <circle class="dotR" cx="24" cy="21" r="6" />
    <circle class="dotY" cx="46" cy="21" r="6" />
    <circle class="dotG" cx="68" cy="21" r="6" />
    <text class="muted" x="98" y="26">Obsidian - Personal Notes (mock)</text>
    <rect class="sidebar" x="0" y="42" width="320" height="428" />
    <rect class="content" x="320" y="42" width="720" height="428" />
    <text class="h2" x="28" y="78">Files</text>
    <text class="folderStrong" x="30" y="112">▾ Notes Sync Helper</text>
    <text class="note" x="58" y="140">Daily Capture.md</text>
    <text class="note" x="58" y="166">Daily Capture 1.md</text>
    <text class="note" x="58" y="192">Untitled.md</text>
    <text class="folderStrong" x="30" y="226">▾ 2026-05-08</text>
    <text class="note" x="58" y="254">image_001.png</text>
    <text class="note" x="58" y="280">post.md</text>
    <text class="note" x="58" y="306">post copy.md</text>
