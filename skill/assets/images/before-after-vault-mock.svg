    <rect class="chip" x="390" y="168" width="86" height="28" />
    <text class="chipText" x="408" y="187">Hermes</text>
    <rect class="chip2" x="490" y="168" width="170" height="28" />
    <text class="chipText" x="510" y="187">默认模型</text>
    <rect class="chip2" x="675" y="168" width="140" height="28" />
