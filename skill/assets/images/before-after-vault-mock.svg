    <text class="folderStrong" x="30" y="366">▸ Automation</text>
    <text class="folderStrong" x="30" y="392">▸ Inbox</text>
    <text class="note" x="30" y="426">Screenshot 14.32.01.png</text>
    <rect class="tab" x="360" y="80" width="164" height="34" />
    <text class="text" x="382" y="103">Untitled.md</text>
    <text class="head" x="360" y="158">Where did my note go?</text>
    <line class="line" x1="360" y1="184" x2="910" y2="184" />
    <text class="text" x="360" y="224">I wrote something on the right side, but I cannot find it in the left file list.</text>
    <text class="text" x="360" y="260">There are repeated titles and date folders, but I do not know what each date contains.</text>
    <rect class="callout" x="360" y="310" width="500" height="105" />
    <text class="fake" x="385" y="342">Typical pain points</text>
    <text class="muted" x="385" y="372">• duplicate titles    • English folder names    • loose images mixed with notes</text>
    <circle class="warn" cx="980" cy="102" r="6" />
  </g>

  <text class="sectionTitle" x="70" y="710">After: organized and actionable</text>
  <g transform="translate(70,735)">
